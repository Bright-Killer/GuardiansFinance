<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftTopup - Top Up Game Instan Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        .neon { text-shadow: 0 0 15px rgb(16 185 129); }
        .card-hover:hover { transform: translateY(-12px) scale(1.03); }
        .live-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full bg-zinc-950/90 backdrop-blur-lg border-b border-zinc-800 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-violet-500 rounded-2xl flex items-center justify-center text-3xl">⚡</div>
                <span class="text-3xl font-bold tracking-tighter neon">SWIFTTOPUP</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#games" class="hover:text-emerald-400 transition">Game</a>
                <a href="#live" class="hover:text-emerald-400 transition">Live Order</a>
                <a href="#" onclick="toggleCart()" class="flex items-center gap-2 hover:text-emerald-400 transition">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count" class="text-emerald-400 font-bold">0</span>
                </a>
            </div>
            <button onclick="window.open('https://wa.me/6281234567890?text=Halo%20SwiftTopup,%20mau%20topup%20game','_blank')" 
                    class="bg-emerald-500 hover:bg-emerald-600 px-6 py-3 rounded-2xl font-semibold flex items-center gap-2 transition">
                <i class="fa-brands fa-whatsapp"></i> WA
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <header class="pt-24 min-h-screen bg-gradient-to-br from-zinc-900 to-black flex items-center relative">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-2 bg-emerald-950 text-emerald-400 px-5 py-2 rounded-3xl text-sm">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></div>
                    124 TRANSAKSI SEDANG LIVE
                </div>
                <h1 class="text-6xl md:text-7xl font-bold tracking-tighter leading-none neon">TOP UP GAME<br><span class="text-emerald-400">LANGSUNG JADI</span></h1>
                <p class="text-xl text-zinc-400">Proses instan • Harga termurah • Aman 100% • 24/7</p>
                <button onclick="document.getElementById('games').scrollIntoView({behavior:'smooth'})" 
                        class="bg-white text-black px-10 py-5 rounded-3xl font-bold text-lg flex items-center gap-3 hover:scale-105 transition">
                    Pilih Game Sekarang <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
            <div class="relative">
                <img src="https://picsum.photos/id/1015/800/600" class="rounded-3xl shadow-2xl" alt="Gaming">
            </div>
        </div>
    </header>

    <!-- LIVE TRANSACTIONS -->
    <section id="live" class="py-12 bg-zinc-900 border-y border-zinc-800">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-center text-2xl font-bold mb-8 flex items-center justify-center gap-3">
                <span class="text-emerald-400">● LIVE</span> TRANSAKSI TERBARU
            </h2>
            <div id="live-feed" class="space-y-4 max-h-80 overflow-y-auto"></div>
        </div>
    </section>

    <!-- GAMES -->
    <section id="games" class="py-20">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">Pilih Game Favoritmu</h2>
            <div id="games-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8"></div>
        </div>
    </section>

    <!-- MODAL TOPUP -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl max-w-md w-full p-8">
            <h3 id="modal-game" class="text-3xl font-bold mb-6"></h3>
            <div class="grid grid-cols-3 gap-3 mb-8" id="nominal-grid"></div>
            <input id="uid-input" type="text" placeholder="Masukkan UID / ID Game" 
                   class="w-full bg-zinc-800 rounded-2xl px-5 py-4 text-white placeholder-zinc-500 focus:outline-none">
            <button onclick="processOrder()" 
                    class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-bold text-xl transition">
                Bayar & Proses Instan
            </button>
            <button onclick="closeModal()" class="mt-4 w-full py-4 text-zinc-400">Batal</button>
        </div>
    </div>

    <!-- FLOATING WA -->
    <a href="https://wa.me/6281234567890" target="_blank" 
       class="fixed bottom-8 right-8 bg-green-500 w-16 h-16 rounded-3xl flex items-center justify-center text-5xl shadow-2xl z-50 hover:scale-110 transition">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const games = [
            {name:"Mobile Legends", icon:"🛡️", color:"from-violet-500 to-fuchsia-500"},
            {name:"Free Fire", icon:"🔥", color:"from-orange-500 to-red-500"},
            {name:"Genshin Impact", icon:"🌟", color:"from-amber-500 to-yellow-500"},
            {name:"Valorant", icon:"🎯", color:"from-red-500 to-rose-500"},
            {name:"Roblox", icon:"📦", color:"from-blue-500 to-cyan-500"},
            {name:"PUBG Mobile", icon:"🔫", color:"from-emerald-500 to-teal-500"}
        ];

        function populateGames() {
            const container = document.getElementById('games-grid');
            games.forEach(g => {
                const div = document.createElement('div');
                div.className = `bg-gradient-to-br ${g.color} aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer card-hover`;
                div.innerHTML = `<div class="text-7xl mb-4">${g.icon}</div><p class="font-bold text-xl">${g.name}</p>`;
                div.onclick = () => showModal(g.name);
                container.appendChild(div);
            });
        }

        let currentGame = "";
        function showModal(game) {
            currentGame = game;
            document.getElementById('modal-game').textContent = `Top Up ${game}`;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            const grid = document.getElementById('nominal-grid');
            grid.innerHTML = `
                <button onclick="selectNominal(this)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-medium">257 DM</button>
                <button onclick="selectNominal(this)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-medium">500 DM</button>
                <button onclick="selectNominal(this)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-medium">1000 DM</button>
            `;
        }

        function selectNominal(el) {
            document.querySelectorAll('#nominal-grid button').forEach(b => b.classList.remove('ring-2','ring-emerald-400'));
            el.classList.add('ring-2','ring-emerald-400');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function processOrder() {
            const uid = document.getElementById('uid-input').value || "UID123456";
            alert(`✅ Order ${currentGame} berhasil diproses!\nUID: ${uid}\nStatus: Langsung masuk ke akun kamu (live)`);
            closeModal();
            addLiveTransaction(`Topup ${currentGame} • ${uid}`);
        }

        function addLiveTransaction(text) {
            const feed = document.getElementById('live-feed');
            const item = document.createElement('div');
            item.className = "bg-zinc-900 border border-emerald-900 p-4 rounded-2xl flex justify-between items-center";
            item.innerHTML = `<div><span class="font-medium">${text}</span></div><div class="text-xs text-emerald-400">✔️ Sukses</div>`;
            feed.prepend(item);
            if (feed.children.length > 7) feed.lastChild.remove();
        }

        function startLive() {
            const examples = ["Budi topup MLBB 500 DM", "Rina topup Genshin 980 GC", "Andi topup Free Fire 1000 DM", "Sari topup Valorant 2000 VP"];
            let i = 0;
            setInterval(() => {
                addLiveTransaction(examples[i % examples.length]);
                i++;
            }, 6000);
        }

        let cart = 0;
        function updateCart() {
            document.getElementById('cart-count').textContent = ++cart;
        }

        window.onload = () => {
            populateGames();
            startLive();
            for(let i=0; i<5; i++) addLiveTransaction("Player" + (100+i) + " topup MLBB");
        };

        function toggleCart() {
            alert("🛒 Keranjang kosong (demo). Tambahkan produk dari modal!");
        }
    </script>
</body>
</html>
