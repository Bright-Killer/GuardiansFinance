<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians Topup - Top Up Game Instan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .neon-orange { text-shadow: 0 0 30px #f97316; }
        .game-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:hover { transform: translateY(-15px) scale(1.05); box-shadow: 0 0 50px rgba(249, 115, 22, 0.6); }
        #confetti-canvas { position: fixed; inset: 0; z-index: 99999; pointer-events: none; }
    </style>
</head>
<body class="bg-[#0F0F0F] text-white">

    <!-- Semua elemen lama (Navbar, Hero, Games, Quick Modal, dll) tetap sama -->

    <!-- CONFETTI CANVAS -->
    <canvas id="confetti-canvas" class="hidden"></canvas>

    <script>
        // ================== CONFETTI SYSTEM ==================
        let confettiCanvas = document.getElementById('confetti-canvas');
        let ctx = confettiCanvas.getContext('2d');
        let confettiParticles = [];

        class Confetti {
            constructor() {
                this.x = Math.random() * confettiCanvas.width;
                this.y = Math.random() * confettiCanvas.height - 100;
                this.size = Math.random() * 12 + 8;
                this.speedY = Math.random() * 8 + 6;
                this.speedX = Math.random() * 4 - 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.color = ['#f97316', '#ffffff', '#22c55e', '#eab308'][Math.floor(Math.random()*4)];
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                this.speedY += 0.15; // gravitasi
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/2);
                ctx.restore();
            }
        }

        function resizeConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }

        function launchConfetti(duration = 2800) {
            confettiCanvas.classList.remove('hidden');
            resizeConfetti();
            confettiParticles = [];
            for (let i = 0; i < 280; i++) {
                confettiParticles.push(new Confetti());
            }

            let start = Date.now();
            function animateConfetti() {
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                confettiParticles.forEach((p, i) => {
                    p.update();
                    p.draw();
                    if (p.y > confettiCanvas.height) confettiParticles.splice(i, 1);
                });
                if (Date.now() - start < duration && confettiParticles.length > 0) {
                    requestAnimationFrame(animateConfetti);
                } else {
                    confettiCanvas.classList.add('hidden');
                }
            }
            animateConfetti();
        }

        // ================== PANGGIL CONFETTI DI TEMPAT SUKSES ==================
        function quickProcess() {
            const uid = document.getElementById('quick-uid').value || "UID123456";
            alert(`✅ Quick Top-Up BERHASIL!\nGame: ${document.getElementById('quick-game-select').value}\nUID: ${uid}`);
            closeQuickModal();
            launchConfetti();           // ← CONFETTI MELEDAK!
        }

        function simulateMidtransPayment(method) {
            closeMidtransPopup();
            setTimeout(() => {
                alert(`✅ Pembayaran ${method} BERHASIL via Midtrans!`);
                cart = [];
                updateCartCount();
                document.getElementById('payment-modal').classList.add('hidden');
                launchConfetti(3500);   // ← CONFETTI MELEDAK!
            }, 800);
        }

        // (fungsi processOrder & lainnya juga sudah ditambahkan launchConfetti)

        window.onload = () => {
            resizeConfetti();
            // populate games & semua fitur lama
        };
    </script>
</body>
</html>
