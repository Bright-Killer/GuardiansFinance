<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians Topup - Top Up Game Instan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .neon-orange { text-shadow: 0 0 30px #f97316; }
        .game-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 0 50px rgba(249, 115, 22, 0.6);
        }
        .game-image-container { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-[#0F0F0F] text-white">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-lg border-b border-orange-500/30 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🔥</span>
                <span class="text-3xl font-bold tracking-tighter neon-orange">GUARDIANS TOPUP</span>
            </div>
            <button onclick="alert('Quick Top-Up dibuka!')" class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-2xl font-bold flex items-center gap-2">⚡ QUICK TOP-UP</button>
        </div>
    </nav>

    <!-- HERO -->
    <header class="pt-24 min-h-[80vh] flex items-center" style="background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f0f 100%);">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter neon-orange">TOP UP GAME<br>TERMURAH & TERCEPAT</h1>
        </div>
    </header>

    <!-- GAME LIST (SUDAH PASTI MUNcul) -->
    <section id="games" class="py-20 bg-black">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center mb-12">Pilih Game Favoritmu</h2>
            <div id="games-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8"></div>
        </div>
    </section>

    <script>
        const games = [
            {name:"Mobile Legends", img:"https://logos-world.net/wp-content/uploads/2020/11/Mobile-Legends-Logo.png"},
            {name:"Free Fire", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Free_Fire_logo.svg/2560px-Free_Fire_logo.svg.png"},
            {name:"Genshin Impact", img:"https://1000logos.net/wp-content/uploads/2021/05/Genshin-Impact-logo.png"},
            {name:"Valorant", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Valorant_logo_-_pink_color_version.svg/2560px-Valorant_logo_-_pink_color_version.svg.png"},
            {name:"Roblox", img:"https://1000logos.net/wp-content/uploads/2021/05/Roblox-logo.png"},
            {name:"PUBG Mobile", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/PUBG_Mobile_simple_logo_black.png/2560px-PUBG_Mobile_simple_logo_black.png"},
            {name:"Honor of Kings", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Honor_of_Kings_logo.svg/2560px-Honor_of_Kings_logo.svg.png"},
            {name:"Arena of Valor", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Arena_of_Valor_logo.svg/2560px-Arena_of_Valor_logo.svg.png"},
            {name:"Call of Duty Mobile", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Call_of_Duty_Mobile_logo.svg/2560px-Call_of_Duty_Mobile_logo.svg.png"},
            {name:"Clash of Clans", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Clash_of_Clans_logo.svg/2560px-Clash_of_Clans_logo.svg.png"},
            {name:"FIFA Mobile", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/FIFA_Mobile_logo.svg/2560px-FIFA_Mobile_logo.svg.png"},
            {name:"Nikke", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Nikke_logo.svg/2560px-Nikke_logo.svg.png"}
        ];

        function populateGames() {
            const container = document.getElementById('games-grid');
            games.forEach(g => {
                const card = document.createElement('div');
                card.className = `game-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer`;
                card.innerHTML = `
                    <div class="game-image-container flex items-center justify-center p-8 bg-zinc-950">
                        <img src="${g.img}" class="max-h-56 w-auto object-contain">
                    </div>
                    <div class="p-6 text-center">
                        <p class="font-bold text-xl">${g.name}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = populateGames;
    </script>
</body>
</html>
